var numOrEmpty = function (v) { return (v === null || v === undefined) ? "" : v; };
var numOrNull = function (v) { return (v === "" || v === null || v === undefined) ? null : Number(v); };
function fromRow(r) {
  return {
    id: r.id, title: r.title || "", cat: r.cat || "기타", assignee: r.assignee || "",
    status: r.status || "todo",
    before: numOrEmpty(r.before_min), after: numOrEmpty(r.after_min),
    beforeCnt: numOrEmpty(r.before_cnt), afterCnt: numOrEmpty(r.after_cnt),
    progress: r.progress || 0, reason: r.reason || "", note: r.note || ""
  };
}
function toRow(c) {
  return {
    title: c.title || "", cat: c.cat, assignee: c.assignee || "", status: c.status,
    before_min: numOrNull(c.before), after_min: numOrNull(c.after),
    before_cnt: numOrNull(c.beforeCnt), after_cnt: numOrNull(c.afterCnt),
    progress: Number(c.progress) || 0, reason: c.reason || "", note: c.note || ""
  };
}
async function apiGet() {
  var res = await sbc.from("tasks").select("*").eq("deleted", false).order("id", { ascending: true });
  if (res.error) throw res.error;
  return res.data.map(fromRow);
}
async function apiInsert(card) {
  var res = await sbc.from("tasks").insert(toRow(card)).select().single();
  if (res.error) throw res.error;
  return fromRow(res.data);
}
async function apiUpdate(card) {
  var res = await sbc.from("tasks").update(toRow(card)).eq("id", card.id);
  if (res.error) throw res.error;
}
async function apiDelete(id) {
  var res = await sbc.from("tasks").update({ deleted: true }).eq("id", id);
  if (res.error) throw res.error;
}

function Tag(props) {
  return e("span", { className: "inline-flex items-center rounded-md px-1.5 py-0.5 text-[11px] font-medium ring-1 ring-inset " + props.className }, props.label);
}

          : e("span", { className: "text-slate-300" }, "🔁 —")
      )
    ),
    e("div", { className: "mt-2 flex items-center gap-1 rounded-lg px-2 py-1 text-[11px] ring-1 ring-inset " + st.cls },

    ),
    e("div", { className: "mt-2 text-[11px] text-slate-400" }, "👤 " + (t.assignee || "—"))

}

function Kpi(props) {
  return e("div", { className: "rounded-xl bg-white p-3.5 text-center shadow-sm ring-1 ring-inset ring-slate-200" },

  var data = props.data;
  var errState = useState(false), err = errState[0], setErr = errState[1];
  function set(k, v) { var n = Object.assign({}, data); n[k] = v; props.onChange(n); }

  var numInput = "w-16 rounded-lg border border-slate-200 px-2 py-1 text-center outline-none focus:border-slate-400";

  return e("div", { className: "fixed inset-0 z-50 flex items-center justify-center bg-black/30 p-4" },

        e("h2", { className: "text-[15px] font-bold" }, data.id ? "업무 상세 / 수정" : "새 업무"),
        e("button", { onClick: props.onClose, className: "text-slate-400 hover:text-slate-700" }, "✕")
      ),
      e("div", { className: "space-y-2.5" },
        e("div", null,
          e("input", {
            className: field + (err ? " border-red-400 bg-red-50/40" : ""), placeholder: "업무명 (필수)", value: data.title,
            onChange: function (ev) { set("title", ev.target.value); if (err) setErr(false); }
          }),
          err ? e("p", { className: "mt-1 text-[11px] text-red-500" }, "업무명을 입력해줘.") : null
        ),
        e("div", { className: "grid grid-cols-2 gap-2.5" },

            e("label", { className: "mb-1 block text-[11px] font-medium text-slate-500" }, "분류"),
            e("select", { className: field, value: data.cat, onChange: function (ev) { set("cat", ev.target.value); } },

            e("select", { className: field, value: data.assignee, onChange: function (ev) { set("assignee", ev.target.value); } },
              [e("option", { key: "_", value: "" }, "미지정")].concat(ASSIGNEE_OPTIONS.map(function (o) { return e("option", { key: o }, o); })))

        ),
        e("div", null,

            e("span", { className: "text-slate-400" }, "분")
          ),
          e("div", { className: "flex items-center gap-2 text-[13px]" },
            e("span", { className: "w-12 shrink-0 text-[12px] text-slate-500" }, "🔁 횟수"),

            e("span", { className: "text-slate-400" }, "번/건")
          )
        ),
        data.status !== "done"

              e("input", { type: "range", min: "0", max: "100", value: data.progress, onChange: function (ev) { set("progress", Number(ev.target.value)); }, className: "w-full" }))
          : null,

          ? e("input", { className: field + " border-red-200 bg-red-50/40", placeholder: "🔴 막힌 사유 (예: 예산 / 사람 / 히스토리)", value: data.reason, onChange: function (ev) { set("reason", ev.target.value); } })

function CatAccordion(props) {
  var openState = useState({}), open = openState[0], setOpen = openState[1];
  function toggle(c) { var n = Object.assign({}, open); n[c] = !n[c]; setOpen(n); }
  if (props.items.length === 0) {
    return e("div", { className: "rounded-xl bg-white p-4 shadow-sm ring-1 ring-inset ring-slate-200" },
      e("div", { className: "mb-3 text-[14px] font-bold text-slate-800" }, "분류별 완료 성과"),
      e("p", { className: "py-3 text-center text-[12px] text-slate-300" }, "데이터 없음"));
  }
  return e("div", { className: "rounded-xl bg-white p-4 shadow-sm ring-1 ring-inset ring-slate-200" },
    e("div", { className: "mb-3 text-[14px] font-bold text-slate-800" }, "분류별 완료 성과 ",
      e("span", { className: "text-[11px] font-normal text-slate-400" }, "(클릭해서 펼치기)")),
    e("div", { className: "flex flex-col gap-2" },
      props.items.map(function (x) {
        var isOpen = !!open[x.c];
        return e("div", { key: x.c, className: "overflow-hidden rounded-lg ring-1 ring-inset ring-slate-100" },
          e("button", { onClick: function () { toggle(x.c); }, className: "flex w-full items-center gap-2 px-2.5 py-2 text-left hover:bg-slate-50" },
            e("span", { className: "shrink-0 text-[9px] text-slate-400 transition-transform " + (isOpen ? "rotate-90" : "") }, "▶"),
            e(Tag, { label: x.c, className: catColor(x.c) }),

            e("span", { className: "ml-auto flex items-center gap-1.5 text-[11px] tabular-nums" },

              x.savedCnt > 0 ? e("span", { className: "font-semibold text-indigo-600" }, "🔁▼" + x.savedCnt) : null
            )
          ),
          e("div", { className: "px-2.5 pb-2" },
            e("div", { className: "h-1.5 w-full overflow-hidden rounded-full bg-slate-100" },

            )

                    );

function App() {
  var tasksState = useState([]), tasks = tasksState[0], setTasks = tasksState[1];
  var loadingState = useState(true), loading = loadingState[0], setLoading = loadingState[1];
  var savingState = useState(false), saving = savingState[0], setSaving = savingState[1];
  var errState = useState(null), err = errState[0], setErr = errState[1];
  var noticeState = useState(null), notice = noticeState[0], setNotice = noticeState[1];
  var liveState = useState(false), live = liveState[0], setLive = liveState[1];
  var activeState = useState("전체"), active = activeState[0], setActive = activeState[1];
  var activeAsgState = useState("전체"), activeAsg = activeAsgState[0], setActiveAsg = activeAsgState[1];
  var modalState = useState(null), modal = modalState[0], setModal = modalState[1];
  var dragState = useState(null), dragId = dragState[0], setDragId = dragState[1];
  var refetchTimer = useRef(null);

  var flash = useCallback(function (m) { setNotice(m); setTimeout(function () { setNotice(null); }, 3500); }, []);
  var refresh = useCallback(async function () {
    try { var t = await apiGet(); setTasks(t); setErr(null); }
    catch (ex) { setErr(ex.message || String(ex)); }
    finally { setLoading(false); }
  }, []);

  useEffect(function () {
    refresh();
    var ch = sbc.channel("tasks-rt")
      .on("postgres_changes", { event: "*", schema: "public", table: "tasks" }, function () {
        if (refetchTimer.current) clearTimeout(refetchTimer.current);
        refetchTimer.current = setTimeout(refresh, 250);
      })
      .subscribe(function (status) { setLive(status === "SUBSCRIBED"); });
    return function () { sbc.removeChannel(ch); if (refetchTimer.current) clearTimeout(refetchTimer.current); };
  }, [refresh]);

  var chips = useMemo(function () {
    var present = {}; tasks.forEach(function (t) { present[t.cat] = 1; });
    return CAT_OPTIONS.filter(function (c) { return present[c]; });
  }, [tasks]);
  useEffect(function () { if (active !== "전체" && chips.indexOf(active) < 0) setActive("전체"); }, [chips, active]);

  var asgChips = useMemo(function () {
    var present = {}; tasks.forEach(function (t) { present[asgOf(t)] = 1; });
    return ["미지정"].concat(ASSIGNEE_OPTIONS).filter(function (a) { return present[a]; });
  }, [tasks]);
  useEffect(function () { if (activeAsg !== "전체" && asgChips.indexOf(activeAsg) < 0) setActiveAsg("전체"); }, [asgChips, activeAsg]);

  var filtered = useMemo(function () {
    return tasks.filter(function (t) {
      return (active === "전체" || t.cat === active) && (activeAsg === "전체" || asgOf(t) === activeAsg);
    });
  }, [tasks, active, activeAsg]);

  var filterLabel = useMemo(function () {
    var parts = [active !== "전체" ? active : null, activeAsg !== "전체" ? activeAsg : null].filter(Boolean);
    return parts.length ? parts.join("·") : "전체";
  }, [active, activeAsg]);

  var stats = useMemo(function () {
    var done = filtered.filter(function (t) { return t.status === "done"; });
    var doing = filtered.filter(function (t) { return t.status === "doing"; });
    var stuck = filtered.filter(function (t) { return t.status === "stuck"; });
    var effDone = done.filter(isEff), cntDone = done.filter(isCnt);
    var totalSaved = effDone.reduce(function (s, t) { return s + (t.before - t.after); }, 0);
    var totalCnt = cntDone.reduce(function (s, t) { return s + (t.beforeCnt - t.afterCnt); }, 0);
    return { done: done, doing: doing, stuck: stuck, totalSaved: totalSaved, totalCnt: totalCnt, effCount: effDone.length, cntCount: cntDone.length };
  }, [filtered]);

  var byCat = useMemo(function () {
    return CAT_OPTIONS.map(function (c) {
      var inCat = tasks.filter(function (t) { return t.cat === c; });
      var dn = inCat.filter(function (t) { return t.status === "done"; });
      var saved = dn.filter(isEff).reduce(function (s, t) { return s + (t.before - t.after); }, 0);
      var savedCnt = dn.filter(isCnt).reduce(function (s, t) { return s + (t.beforeCnt - t.afterCnt); }, 0);
      return { c: c, all: inCat.length, done: dn.length, saved: saved, savedCnt: savedCnt, doneTasks: dn };
    }).filter(function (x) { return x.all > 0; });
  }, [tasks]);

  function onDragStart(ev, id) { setDragId(id); ev.dataTransfer.effectAllowed = "move"; }
  function onDrop(status) {
    if (dragId == null) return;
    var card = tasks.find(function (t) { return t.id === dragId; });
    setDragId(null);
    if (!card || card.status === status) return;
    var prev = tasks;
    var updated = Object.assign({}, card, { status: status });
    setTasks(tasks.map(function (t) { return t.id === card.id ? updated : t; }));
    apiUpdate(updated).catch(function (ex) { setTasks(prev); flash("이동 저장 실패 — " + (ex.message || ex)); });
  }

  async function saveModal() {
    var card = modal;
    setSaving(true);
    try {
      if (card.id) {
        setTasks(tasks.map(function (t) { return t.id === card.id ? card : t; }));
        await apiUpdate(card);
      } else {
        var created = await apiInsert(card);
        setTasks(function (ts) { return ts.some(function (t) { return t.id === created.id; }) ? ts : ts.concat([created]); });
      }
      setModal(null);
    } catch (ex) { flash("저장 실패 — " + (ex.message || ex)); }
    finally { setSaving(false); }
  }

  async function deleteTask(id) {
    if (!confirm("정말 삭제하시겠습니까?")) return;
    var prev = tasks;
    setTasks(tasks.filter(function (t) { return t.id !== id; }));
    setModal(null);
    try { await apiDelete(id); }
    catch (ex) { setTasks(prev); flash("삭제 실패 — " + (ex.message || ex)); }
  }

  function chipCls(on) {
    return "rounded-full px-3 py-1 text-[12px] font-medium transition " + (on ? "bg-slate-900 text-white" : "bg-white text-slate-500 ring-1 ring-inset ring-slate-200 hover:bg-slate-100");
  }

  var header = e("div", { className: "mb-3 flex flex-wrap items-center gap-2" },
    e("h1", { className: "mr-1 text-lg font-bold tracking-tight text-slate-900" }, "전략실행2팀 업무 보드"),
    e("span", { className: "inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[11px] font-medium " + (live ? "bg-emerald-50 text-emerald-600 ring-1 ring-inset ring-emerald-200" : "bg-slate-100 text-slate-400") },
      e("span", { className: "h-1.5 w-1.5 rounded-full " + (live ? "bg-emerald-500" : "bg-slate-300") }), live ? "실시간" : "연결 중"),
    e("button", { onClick: refresh, className: "inline-flex items-center gap-1 rounded-lg bg-white px-2.5 py-1.5 text-[12px] font-medium text-slate-600 ring-1 ring-inset ring-slate-200 hover:bg-slate-100", title: "다시 불러오기" }, "🔄"),
    e("button", { onClick: function () { setModal(Object.assign({}, EMPTY)); }, className: "ml-auto inline-flex items-center gap-1 rounded-lg bg-slate-900 px-3 py-1.5 text-[13px] font-medium text-white hover:bg-slate-700" }, "+ 새 업무")
  );

  var body;
  if (err && tasks.length === 0) {
    body = e("div", { className: "rounded-xl bg-white p-8 text-center shadow-sm ring-1 ring-inset ring-slate-200" },
      e("p", { className: "text-[13px] text-slate-600" }, "데이터를 불러오지 못했어."),
      e("p", { className: "mt-1 text-[11px] text-slate-400" }, err),
      e("button", { onClick: refresh, className: "mt-3 rounded-lg bg-slate-900 px-4 py-1.5 text-[13px] font-medium text-white hover:bg-slate-700" }, "다시 시도"));
  } else if (loading && tasks.length === 0) {
    body = e("div", { className: "py-20 text-center text-[13px] text-slate-400" }, "불러오는 중…");
  } else {
    var kpiRow = e("div", { className: "mb-4 grid grid-cols-4 gap-3" },
      e("div", { className: "rounded-xl bg-white p-3.5 text-center shadow-sm ring-1 ring-inset ring-slate-200" },
        e("div", { className: "text-[11px] font-medium text-slate-500" }, "총 절감 (" + filterLabel + ")"),
        e("div", { className: "mt-1 flex items-center justify-center gap-3" },
          e("div", null,
            e("div", { className: "text-[18px] font-bold leading-none text-emerald-600 tabular-nums" }, stats.totalSaved > 0 ? "▼" + stats.totalSaved : "—", e("span", { className: "ml-0.5 text-[11px] font-medium" }, stats.totalSaved > 0 ? "분" : "")),
            e("div", { className: "mt-1 text-[10px] text-slate-400" }, "⏱ 시간 " + stats.effCount + "건")
          ),
          e("div", { className: "h-7 w-px bg-slate-200" }),
          e("div", null,
            e("div", { className: "text-[18px] font-bold leading-none text-indigo-600 tabular-nums" }, stats.totalCnt > 0 ? "▼" + stats.totalCnt : "—", e("span", { className: "ml-0.5 text-[11px] font-medium" }, stats.totalCnt > 0 ? "번/건" : "")),
            e("div", { className: "mt-1 text-[10px] text-slate-400" }, "🔁 횟수 " + stats.cntCount + "건")
          )
        )
      ),
      e(Kpi, { label: "진행 중", value: stats.doing.length, accent: "text-blue-600" }),
      e(Kpi, { label: "🔴 막힘", value: stats.stuck.length, sub: stats.stuck.length ? "보드 '막힘' 컬럼에 사유" : "막힌 업무 없음", accent: "text-red-600" }),
      e(Kpi, { label: "완료", value: stats.done.length, accent: "text-emerald-600" })
    );

    var catRow = chips.length > 0 ? e("div", { className: "mb-2 flex flex-wrap items-center gap-1.5" },
      e("span", { className: "mr-1 w-9 shrink-0 text-[11px] font-semibold text-slate-400" }, "분류"),
      ["전체"].concat(chips).map(function (m) { return e("button", { key: m, onClick: function () { setActive(m); }, className: chipCls(active === m) }, m); })
    ) : null;

    var asgRow = asgChips.length > 0 ? e("div", { className: "mb-4 flex flex-wrap items-center gap-1.5" },
      e("span", { className: "mr-1 w-9 shrink-0 text-[11px] font-semibold text-slate-400" }, "담당"),
      ["전체"].concat(asgChips).map(function (m) { return e("button", { key: m, onClick: function () { setActiveAsg(m); }, className: chipCls(activeAsg === m) }, m === "전체" ? "전체" : "👤 " + m); })
    ) : null;

    var boardCols = e("div", { className: "col-span-3 flex gap-3" },
      COLUMNS.map(function (col) {
        var items = filtered.filter(function (t) { return t.status === col.key; });
        return e("div", { key: col.key, onDragOver: function (ev) { ev.preventDefault(); }, onDrop: function () { onDrop(col.key); }, className: "flex min-w-0 flex-1 flex-col rounded-xl p-1" },
          e("div", { className: "mb-2 flex items-center gap-1.5 px-1" },
            e("span", { className: "h-2 w-2 rounded-full " + col.dot }),
            e("span", { className: "text-[13px] font-semibold text-slate-700" }, col.label),
            e("span", { className: "ml-auto rounded-full bg-slate-200/70 px-1.5 text-[11px] font-medium text-slate-500 tabular-nums" }, items.length)
          ),
          e("div", { className: "flex min-h-[80px] flex-col gap-2" },
            items.map(function (t) { return e(Card, { key: t.id, t: t, onDragStart: onDragStart, onClick: function (task) { setModal(Object.assign({}, task)); }, onDelete: deleteTask }); }),
            items.length === 0 ? e("div", { className: "rounded-xl border border-dashed border-slate-200 py-6 text-center text-[11px] text-slate-300" }, "여기로 드래그") : null
          )
        );
      })
    );

    var rightPanel = e("div", { className: "col-span-1 flex flex-col gap-3" },
      e(CatAccordion, { items: byCat, onOpenCard: function (t) { setModal(Object.assign({}, t)); } })
    );

    body = e(React.Fragment, null,
      kpiRow, catRow, asgRow,
      e("div", { className: "grid grid-cols-4 items-start gap-3" }, boardCols, rightPanel),
      e("div", { className: "mt-3 flex items-center gap-3 px-1 text-[11px] text-slate-400" },
        e("span", null, "Supabase 저장 · 팀 실시간 공유"),
        e("span", { className: "text-slate-300" }, "|"),
        e("span", null, "다른 사람이 바꾸면 자동으로 반영돼")
      )
    );
  }

  return e("div", { className: "min-h-screen w-full p-4" },
    header,
    notice ? e("div", { className: "mb-3 rounded-lg bg-red-50 px-3 py-2 text-[12px] text-red-700 ring-1 ring-inset ring-red-200" }, notice) : null,
    body,
    modal ? e(Modal, { data: modal, onChange: setModal, onSave: saveModal, onClose: function () { setModal(null); }, onDelete: deleteTask, saving: saving }) : null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
