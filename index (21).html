<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전략실행2팀 업무 보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
  .clamp2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
</style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const MAIN_OPTIONS = ["보험", "오프라인", "CS", "핀테크", "다나와", "사운본", "B2B"];
const SUB_OPTIONS = ["없음", "미팅자동화", "환급서비스", "HR온보딩"];

const MAIN_COLORS = {
  "보험": "bg-rose-50 text-rose-700 ring-rose-200",
  "오프라인": "bg-orange-50 text-orange-700 ring-orange-200",
  "CS": "bg-violet-50 text-violet-700 ring-violet-200",
  "핀테크": "bg-cyan-50 text-cyan-700 ring-cyan-200",
  "다나와": "bg-emerald-50 text-emerald-700 ring-emerald-200",
  "사운본": "bg-amber-50 text-amber-700 ring-amber-200",
  "B2B": "bg-sky-50 text-sky-700 ring-sky-200",
};

const COLUMNS = [
  { key: "todo", label: "시작 전", dot: "bg-slate-300" },
  { key: "doing", label: "진행 중", dot: "bg-blue-500" },
  { key: "stuck", label: "막힘", dot: "bg-red-500" },
  { key: "done", label: "완료", dot: "bg-emerald-500" },
];

// 문서 기반 시드 데이터
const SEED = [
  { id: 1, title: "CSO 업무 관리 (PM)", main: "CS", sub: "없음", assignee: "임서정", due: "06.01", status: "doing", before: "", after: "", progress: 50, reason: "", note: "CSO 업무 452개 정리 완료. 진행상황·우선순위는 CS 내부 구성원과 함께 정리 필요." },
  { id: 2, title: "CS 채팅방 효율화", main: "CS", sub: "없음", assignee: "임서정", due: "—", status: "doing", before: "", after: "", progress: 40, reason: "", note: "야간근무: 대시보드 기획만 남음 / 센터장·파트장 보고: 정리 중. (황치훈 실장 회신 지연)" },
  { id: 3, title: "CS 인센티브 계산 자동화", main: "CS", sub: "없음", assignee: "임서정", due: "06.10", status: "doing", before: "", after: "", progress: 85, reason: "", note: "FAQ 자동응답 봇 세팅만 남음. 6/10 개발 방식 논의 예정 (예상 2시간)." },
  { id: 4, title: "CS 교육 자동화 (상담 시뮬레이터)", main: "CS", sub: "없음", assignee: "임서정", due: "—", status: "doing", before: "", after: "", progress: 35, reason: "", note: "AI 상담 시뮬레이터로 신입 사전 교육. CCO·교육팀 컨펌 하 개발 중." },

  { id: 5, title: "크로스셀링 — 상조 킥오프", main: "오프라인", sub: "없음", assignee: "임서정", due: "—", status: "stuck", before: "", after: "", progress: 10, reason: "CMO·상조·오프라인 3자 킥오프 미진행 (주최자 부재), 인수인계 담당 없음", note: "가이드 교육은 완료. 마케팅 조직과 미소통 상태." },
  { id: 6, title: "크로스셀링 — 보험", main: "오프라인", sub: "없음", assignee: "임서정", due: "—", status: "doing", before: "", after: "", progress: 30, reason: "", note: "유전자키트 유입-상담-접수 대시보드 세팅 완료. 이후 활동 보류." },
  { id: 7, title: "CRM 만족도조사 자동발송 (아정스토어)", main: "오프라인", sub: "없음", assignee: "임서정", due: "—", status: "stuck", before: "", after: "", progress: 30, reason: "CRM 개발 지연으로 대기", note: "자동발송 확인 게시판 신청 완료. 아정스토어 한정." },
  { id: 8, title: "오프라인 '매장관리' → CRM 통합", main: "오프라인", sub: "없음", assignee: "임서정", due: "—", status: "doing", before: "", after: "", progress: 25, reason: "", note: "매장관리 대시보드 CRM 연동 기획 / 크로스셀링 슬랙 세팅 / 매장·직원별 트래킹. (오프라인 관리 인력 부재)" },
  { id: 9, title: "오프라인 CCTV 설치", main: "오프라인", sub: "없음", assignee: "임서정", due: "—", status: "stuck", before: "", after: "", progress: 5, reason: "업체 견적 과다 — 네고 불가, 대안 업체 필요", note: "실제 인입량 트래킹용." },

  { id: 10, title: "모바일 정책 자동화", main: "사운본", sub: "없음", assignee: "신충호", due: "—", status: "doing", before: 150, after: "", progress: 50, reason: "", note: "상부점 정책을 상담사용 원페이지로 자동 업데이트. 온라인 정책 진행 중, 오프라인은 담당자 채용 중." },
  { id: 11, title: "인터넷&유심 정책 자동화", main: "사운본", sub: "없음", assignee: "김은지", due: "—", status: "doing", before: 150, after: "", progress: 15, reason: "", note: "모바일과 동일 구조. 정책팀 이관 검토 중." },
  { id: 12, title: "센터장 판매마진평균 계산 자동화", main: "사운본", sub: "없음", assignee: "김은지", due: "—", status: "doing", before: 30, after: "", progress: 20, reason: "", note: "데일리 마진평균 계산·전달. 현재 위클리로 지연, 자동화 시 데일리 가능." },

  { id: 13, title: "G마켓 입점 준비", main: "B2B", sub: "없음", assignee: "심현우", due: "—", status: "doing", before: "", after: "", progress: 20, reason: "", note: "현우 주도(서정 부). 세팅 후 외부 업체 미팅 예정. 내 역할 정의 필요." },
];

const STORAGE_KEY = "ts2_board_v1";
function loadTasks() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch (e) {}
  return SEED;
}
function saveTasks(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch (e) {} }

const EMPTY = { title: "", main: "보험", sub: "없음", assignee: "", due: "", status: "todo", before: "", after: "", progress: 0, reason: "", note: "" };

function Tag({ label, className }) {
  return <span className={"inline-flex items-center rounded-md px-1.5 py-0.5 text-[11px] font-medium ring-1 ring-inset " + className}>{label}</span>;
}

function Card({ t, onDragStart, onClick, onDelete }) {
  const stuck = t.status === "stuck";
  const hasEff = t.before !== "" && t.after !== "" && !isNaN(t.before) && !isNaN(t.after);
  return (
    <div draggable onDragStart={(e) => onDragStart(e, t.id)} onClick={() => onClick(t)}
      className={"group relative cursor-grab rounded-xl bg-white p-3 shadow-sm ring-1 ring-inset transition hover:shadow-md active:cursor-grabbing " + (stuck ? "ring-red-200 border-l-4 border-l-red-400" : "ring-slate-200")}>
      <button onClick={(e) => { e.stopPropagation(); onDelete(t.id); }}
        className="absolute -right-1.5 -top-1.5 hidden h-5 w-5 items-center justify-center rounded-full bg-white text-slate-400 shadow ring-1 ring-slate-200 hover:bg-red-50 hover:text-red-500 group-hover:flex" title="삭제">✕</button>

      <div className="flex items-center justify-between">
        <span className="text-[10px] font-medium text-slate-400">#{t.id}</span>
        <div className="flex gap-1">
          <Tag label={t.main} className={MAIN_COLORS[t.main]} />
          {t.sub && t.sub !== "없음" && <Tag label={t.sub} className="bg-slate-50 text-slate-500 ring-slate-200" />}
        </div>
      </div>

      <h3 className="mt-1.5 text-[13px] font-semibold leading-snug text-slate-800">{t.title}</h3>

      {hasEff && (
        <div className="mt-1.5 text-[12px] text-slate-500">
          <span className="text-slate-400 tabular-nums">{t.before}분</span>
          <span className="mx-1 text-slate-300">→</span>
          <span className="font-semibold text-emerald-600 tabular-nums">{t.after}분</span>
          <span className="ml-1.5 text-[11px] text-emerald-600 tabular-nums">▼{t.before - t.after}분</span>
        </div>
      )}

      {t.note && <p className="clamp2 mt-1.5 text-[11px] leading-snug text-slate-500">{t.note}</p>}

      {t.status !== "done" && !hasEff && (
        <div className="mt-2 h-1.5 w-full overflow-hidden rounded-full bg-slate-100">
          <div className="h-full rounded-full bg-blue-500" style={{ width: t.progress + "%" }}></div>
        </div>
      )}

      {stuck && t.reason && <p className="mt-2 rounded-lg bg-red-50/70 px-2 py-1 text-[11px] leading-snug text-red-700 ring-1 ring-inset ring-red-100">🔴 {t.reason}</p>}

      <div className="mt-2.5 flex items-center justify-between text-[11px] text-slate-400">
        <span>👤 {t.assignee || "—"}</span>
        <span className="tabular-nums">{t.due || "—"}</span>
      </div>
    </div>
  );
}

function Modal({ data, onChange, onSave, onClose, onDelete }) {
  const [err, setErr] = useState(false);
  const set = (k, v) => onChange({ ...data, [k]: v });
  const field = "w-full rounded-lg border border-slate-200 px-2.5 py-1.5 text-[13px] outline-none focus:border-slate-400";
  const handleSave = () => { if (!data.title.trim()) { setErr(true); return; } onSave(); };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 p-4" onClick={onClose}>
      <div className="max-h-[90vh] w-full max-w-md overflow-y-auto rounded-2xl bg-white p-5 shadow-xl" onClick={(e) => e.stopPropagation()}>
        <div className="mb-3 flex items-center justify-between">
          <h2 className="text-[15px] font-bold">{data.id ? "업무 수정" : "새 업무"}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700">✕</button>
        </div>
        <div className="space-y-2.5">
          <div>
            <input className={field + (err ? " border-red-400 bg-red-50/40" : "")} placeholder="업무명 (필수)" value={data.title}
              onChange={(e) => { set("title", e.target.value); if (err) setErr(false); }} />
            {err && <p className="mt-1 text-[11px] text-red-500">업무명을 입력해줘.</p>}
          </div>
          <div className="grid grid-cols-2 gap-2.5">
            <div>
              <label className="mb-1 block text-[11px] font-medium text-slate-500">메인 (사업군)</label>
              <select className={field} value={data.main} onChange={(e) => set("main", e.target.value)}>
                {MAIN_OPTIONS.map((o) => <option key={o}>{o}</option>)}
              </select>
            </div>
            <div>
              <label className="mb-1 block text-[11px] font-medium text-slate-500">서브 (요청)</label>
              <select className={field} value={data.sub} onChange={(e) => set("sub", e.target.value)}>
                {SUB_OPTIONS.map((o) => <option key={o}>{o}</option>)}
              </select>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2.5">
            <input className={field} placeholder="담당자" value={data.assignee} onChange={(e) => set("assignee", e.target.value)} />
            <input className={field} placeholder="기한 (06.15)" value={data.due} onChange={(e) => set("due", e.target.value)} />
          </div>
          <div>
            <label className="mb-1 block text-[11px] font-medium text-slate-500">상태</label>
            <select className={field} value={data.status} onChange={(e) => set("status", e.target.value)}>
              {COLUMNS.map((c) => <option key={c.key} value={c.key}>{c.label}</option>)}
            </select>
          </div>
          <div className="rounded-lg bg-slate-50 p-2.5">
            <label className="mb-1 block text-[11px] font-medium text-slate-500">효율화 (선택) — 보고용</label>
            <div className="flex items-center gap-2 text-[13px]">
              <input className="w-20 rounded-lg border border-slate-200 px-2 py-1 text-center outline-none focus:border-slate-400" placeholder="전" type="number"
                value={data.before} onChange={(e) => set("before", e.target.value === "" ? "" : Number(e.target.value))} />
              <span className="text-slate-400">분 →</span>
              <input className="w-20 rounded-lg border border-slate-200 px-2 py-1 text-center outline-none focus:border-slate-400" placeholder="후" type="number"
                value={data.after} onChange={(e) => set("after", e.target.value === "" ? "" : Number(e.target.value))} />
              <span className="text-slate-400">분</span>
            </div>
          </div>
          {data.status !== "done" && (
            <div>
              <label className="mb-1 block text-[11px] font-medium text-slate-500">진행률 {data.progress}%</label>
              <input type="range" min="0" max="100" value={data.progress} onChange={(e) => set("progress", Number(e.target.value))} className="w-full" />
            </div>
          )}
          {data.status === "stuck" && (
            <input className={field + " border-red-200 bg-red-50/40"} placeholder="🔴 막힌 사유 (예: 예산 / 사람 / 히스토리)" value={data.reason} onChange={(e) => set("reason", e.target.value)} />
          )}
          <textarea className={field + " h-20 resize-none"} placeholder="세부 내용 / 메모 (카드에 두 줄까지 표시됨)" value={data.note} onChange={(e) => set("note", e.target.value)} />
        </div>
        <div className="mt-4 flex items-center justify-between">
          {data.id ? <button onClick={() => onDelete(data.id)} className="text-[13px] text-red-500 hover:underline">🗑 삭제</button> : <span />}
          <div className="flex gap-2">
            <button onClick={onClose} className="rounded-lg px-3 py-1.5 text-[13px] text-slate-500 hover:bg-slate-100">취소</button>
            <button onClick={handleSave} className="rounded-lg bg-slate-900 px-4 py-1.5 text-[13px] font-medium text-white hover:bg-slate-700">저장</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tasks, setTasks] = useState(loadTasks);
  const [fMain, setFMain] = useState("전체");
  const [fSub, setFSub] = useState("전체");
  const [modal, setModal] = useState(null);
  const [dragId, setDragId] = useState(null);

  useEffect(() => { saveTasks(tasks); }, [tasks]);

  const filtered = useMemo(() =>
    tasks.filter((t) => (fMain === "전체" || t.main === fMain) && (fSub === "전체" || t.sub === fSub)),
    [tasks, fMain, fSub]);

  const onDragStart = (e, id) => { setDragId(id); e.dataTransfer.effectAllowed = "move"; };
  const onDrop = (status) => {
    if (dragId == null) return;
    setTasks((ts) => ts.map((t) => (t.id === dragId ? { ...t, status } : t)));
    setDragId(null);
  };
  const saveModal = () => {
    if (modal.id) setTasks((ts) => ts.map((t) => (t.id === modal.id ? modal : t)));
    else setTasks((ts) => [...ts, { ...modal, id: (ts.length ? Math.max(...ts.map((x) => x.id)) : 0) + 1 }]);
    setModal(null);
  };
  const deleteTask = (id) => {
    if (!confirm("정말 삭제하시겠습니까?")) return;
    setTasks((ts) => ts.filter((t) => t.id !== id));
    setModal(null);
  };
  const reset = () => { if (confirm("시드 데이터로 초기화할까? (현재 변경사항이 사라져)")) { setTasks(SEED); } };

  const sel = "rounded-lg border border-slate-200 bg-white px-2.5 py-1.5 text-[12px] outline-none focus:border-slate-400";

  return (
    <div className="min-h-screen w-full p-4">
      <div className="mb-4 flex flex-wrap items-center gap-2">
        <h1 className="mr-2 text-lg font-bold tracking-tight text-slate-900">전략실행2팀 업무 보드</h1>
        <select className={sel} value={fMain} onChange={(e) => setFMain(e.target.value)}>
          <option>전체</option>{MAIN_OPTIONS.map((o) => <option key={o}>{o}</option>)}
        </select>
        <select className={sel} value={fSub} onChange={(e) => setFSub(e.target.value)}>
          <option>전체</option>{SUB_OPTIONS.filter((o) => o !== "없음").map((o) => <option key={o}>{o}</option>)}
        </select>
        <button onClick={() => setModal({ ...EMPTY })} className="ml-auto inline-flex items-center gap-1 rounded-lg bg-slate-900 px-3 py-1.5 text-[13px] font-medium text-white hover:bg-slate-700">+ 새 업무</button>
      </div>

      <div className="flex gap-3 overflow-x-auto pb-4">
        {COLUMNS.map((col) => {
          const items = filtered.filter((t) => t.status === col.key);
          return (
            <div key={col.key} onDragOver={(e) => e.preventDefault()} onDrop={() => onDrop(col.key)} className="flex w-[270px] shrink-0 flex-col rounded-xl p-1">
              <div className="mb-2 flex items-center gap-1.5 px-1">
                <span className={"h-2 w-2 rounded-full " + col.dot}></span>
                <span className="text-[13px] font-semibold text-slate-700">{col.label}</span>
                <span className="ml-auto rounded-full bg-slate-200/70 px-1.5 text-[11px] font-medium text-slate-500 tabular-nums">{items.length}</span>
              </div>
              <div className="flex min-h-[80px] flex-col gap-2">
                {items.map((t) => <Card key={t.id} t={t} onDragStart={onDragStart} onClick={(task) => setModal({ ...task })} onDelete={deleteTask} />)}
                {items.length === 0 && <div className="rounded-xl border border-dashed border-slate-200 py-6 text-center text-[11px] text-slate-300">여기로 드래그</div>}
              </div>
            </div>
          );
        })}
      </div>

      <div className="mt-1 flex items-center gap-3 px-1 text-[11px] text-slate-400">
        <span>이 브라우저에 자동 저장됨 (localStorage)</span>
        <button onClick={reset} className="hover:text-slate-600 hover:underline">초기화</button>
      </div>

      {modal && <Modal data={modal} onChange={setModal} onSave={saveModal} onClose={() => setModal(null)} onDelete={deleteTask} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
